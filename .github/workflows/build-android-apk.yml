# Сборка debug APK (Kivy / Buildozer) без локального WSL.
# Артефакт: Actions → последний запуск → Artifacts → pas-mobile-debug-apk
#
# Первый прогон часто 45–90 минут (SDK/NDK и рецепты p4a).
#
# Кэш и загрузка APK требуют права записи у GITHUB_TOKEN:
#   Settings репозитория → Actions → General → Workflow permissions →
#   «Read and write permissions» (не «Read repository contents only»).
# Иначе шаг cache («скачать» в рус. UI) и Upload APK падают с exit code 1.

name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-android-apk.yml'

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    defaults:
      run:
        working-directory: mobile

    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disk space (debug)
        run: df -h

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-venv python3-dev \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential

      - name: Install buildozer
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --user "buildozer>=1.5" "cython>=3.0"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          cython --version

      - name: CI-friendly buildozer.spec
        run: sed -i 's/warn_on_root = 1/warn_on_root = 0/' buildozer.spec

      - name: Cache Buildozer / Android tooling
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.buildozer
            mobile/.buildozer
          key: buildozer-${{ runner.os }}-22.04-${{ hashFiles('mobile/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-22.04-

      - name: Build debug APK
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.android"
          touch "${HOME}/.android/repositories.cfg"
          # Не создавать android-sdk до buildozer: пустой каталог = «SDK уже есть» → скачивание tools пропускается
          # и падает с «sdkmanager … does not exist». Старый битый кэш с только licenses/ — удалить.
          SDK_ROOT="${HOME}/.buildozer/android/platform/android-sdk"
          SM="${SDK_ROOT}/tools/bin/sdkmanager"
          if [[ -d "$SDK_ROOT" && ! -f "$SM" ]]; then
            rm -rf "$SDK_ROOT"
          fi
          # sdkmanager без TTY спрашивает Accept? (y/N); «y» с stdin через yes (код выхода — у buildozer, не у yes/SIGPIPE).
          set +o pipefail
          yes | buildozer android debug
          ec=${PIPESTATUS[1]}
          set -o pipefail
          exit "$ec"

      - name: List output
        run: ls -la bin/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pas-mobile-debug-apk
          path: mobile/bin/*.apk
          if-no-files-found: error
