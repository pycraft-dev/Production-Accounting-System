services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pas_user
      POSTGRES_PASSWORD: pas_secret
      POSTGRES_DB: production_accounting
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://pas_user:pas_secret@db:5432/production_accounting
      JWT_SECRET_KEY: docker-dev-change-me
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:8000
      FILE_STORAGE_PATH: /app/storage/uploads
    volumes:
      - uploads:/app/backend/storage/uploads
      - logs:/app/backend/logs
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  pgdata:
  uploads:
  logs:
